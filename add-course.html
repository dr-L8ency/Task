<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Organizer | Add Course</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-wrap">
      <div>
        <h1 class="logo">Course Organizer</h1>
        <p class="tagline">Add a new course.</p>
      </div>
      <nav aria-label="Main navigation">
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="my-courses.html">My Courses</a></li>
          <li><a class="active" href="add-course.html">Add Course</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="container form-section">
      <div class="section-heading">
        <h2>Add Course</h2>
      </div>

      <form class="course-form" action="#" method="post">
        <div class="form-group">
          <label for="course-name">Course Name</label>
          <input type="text" id="course-name" name="course-name" placeholder="Enter course name" required>
        </div>

        <div class="form-group">
          <label for="instructor">Instructor</label>
          <input type="text" id="instructor" name="instructor" placeholder="Enter instructor name" required>
        </div>

        <div class="form-group">
          <label for="credit-hours">Credit Hours</label>
          <input type="number" id="credit-hours" name="credit-hours" min="1" max="6" placeholder="Enter credit hours" required>
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="5" placeholder="Add course notes, deadlines, or reminders" required></textarea>
        </div>

        <button type="submit" class="btn">Save Course</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Course Organizer.</p>
    </div>
  </footer>
</body>
</html>
