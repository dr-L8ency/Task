<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Organizer | Contact Us</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-wrap">
      <div>
        <h1 class="logo">Course Organizer</h1>
        <p class="tagline">Get in touch for help.</p>
      </div>
      <nav aria-label="Main navigation">
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="my-courses.html">My Courses</a></li>
          <li><a href="add-course.html">Add Course</a></li>
          <li><a class="active" href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="container contact-layout">
      <div class="section-heading">
        <h2>Contact Us</h2>
      </div>

      <div class="cards-grid two-columns">
        <article class="card">
          <h3>Contact Information</h3>
          <p><strong>Email:</strong>Helwanuni@egmail.com</p>
          <p><strong>Phone:</strong> +201001234567</p>
        </article>

        <form class="course-form" action="#" method="post">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Course Organizer.</p>
    </div>
  </footer>
</body>
</html>
